title: Frequently asked questions about preparing data for AI
summary: |

  > [!NOTE]
  > You can now *author* **Prep data for AI** features in both the Power BI service and Power BI Desktop. Users can *consume* these features everywhere that Copilot exists.
  
sections:
  - name: Tooling features
    questions:
      - question: |
          What features does Power BI currently have to help me prepare my data for Copilot?
        answer: |
          Today, Power BI offers four main tooling features to configure your model for natural language processing:

          - [**AI data schemas**](copilot-prepare-data-ai-data-schema.md): Lets you select a subset of a schema for Copilot to use. 
          - [**Verified answers**](copilot-prepare-data-ai-verified-answers.md): A response that a model author configures and validates for accuracy and reliability. Authors can set specific visuals for Copilot to use in a verified answer when a user asks a question that falls into the assigned category. 
          - [**AI instructions**](copilot-prepare-data-ai-instructions.md): Instructions you can set on your model to provide more context on the data in the model. They help Copilot understand when to focus on what data, and help Copilot understand certain mappings that language users might use when they interact with Copilot. 
          - **Descriptions**: Descriptions set on tables and columns to provide more context about the data. Copilot uses descriptions only in Data Analysis Expressions (DAX) queries and search capabilities. 

      - question: |
          In what order should I implement Copilot in Power BI tooling features?
        answer: |
          To get the most value from Copilot in Power BI, implement its tooling features in the following sequence:

          1. [Define the AI data schema](copilot-prepare-data-ai-data-schema.md).

              Start by selecting the specific tables, fields, and measures that Copilot should reference when it answers data questions.

              During model development, you might include elements that aren't relevant for end-user queries. When you narrow the schema, you help Copilot focus on the most meaningful parts of your model, which reduces ambiguity. This practice is important for large datasets that have overlapping or similarly named fields.
              
              Here's an example of how AI data schemas can help Copilot focus on the right data:
              
              When you use the entire schema, Copilot doesn't always know what the user means when they say *sales*. In this case, Copilot returns gross profit margin (GPM), which is a legitimate interpretation of sales, but not the metric that this team typically uses to analyze sales. 
              
              The model author uses the **Prep data for AI** feature and removes the Total GPM measure from the schema that Copilot receives. 
              
              Now, when the user asks the same question, Copilot has more clarity on where to get the answer from and correctly interprets sales by the team's definition and measurement.

              :::image type="content" source="media/copilot-prep-data/copilot-prep-data-faq-step-1.png" alt-text="Screenshot that shows an example of how users can refine an AI data schema to help Copilot focus on the correct data for user queries." lightbox="media/copilot-prep-data/copilot-prep-data-faq-step-1.png":::

          1. [Create verified answers](copilot-prepare-data-ai-verified-answers.md).

              Set up verified answers for common or nuanced questions that users might ask.
              
              Select a visual, and then select **Create verified answer**. Then add trigger phrases that reflect how users are likely to phrase their questions. When users enter a matching or similar phrase in Copilot, it returns the trusted visual. This process helps to ensure consistent, high-quality responses across reports.
              
              The following example shows the benefit of a verified answer. The user asks for *sales by area*. Copilot interprets *area* as *product area* and returns a list of products and their sales. However, the user was looking for sales *by region or location*. 
              
              The model author sets a verified answer by using a visual that includes sales by region. Then, the author includes trigger phrases that, when a user asks them, should return this specific visual response.
              
              Now, when the user asks for *sales by area*, Copilot returns the verified answer that the model author approves.

              :::image type="content" source="media/copilot-prep-data/copilot-prep-data-faq-step-2.png" alt-text="Screenshot that shows an example of how verified answers improve the accuracy of Copilot responses to user queries." lightbox="media/copilot-prep-data/copilot-prep-data-faq-step-2.png":::

          1. [Add AI instructions](copilot-prepare-data-ai-instructions.md).

              After you define the schema and verified answers, you can use AI instructions to guide Copilot's behavior at the model level.

              Instructions help clarify business logic, map user terminology to model fields, and tell Copilot how to interpret or analyze specific types of data. They're helpful because they provide context that Copilot wouldn't infer on its own.

              The following example shows how to use AI instructions to provide more context to Copilot. The user asks about *sales during busy season of 2012*. Busy season is a well-defined, commonly used phrase within this organization. However, the semantic model has no indication of this term anywhere. The model author sets an instruction that defines busy season as June to August. 

              Now, when the user asks the question about *sales during busy season*, Copilot understands this defined term and provides the response. 

              :::image type="content" source="media/copilot-prep-data/copilot-prep-data-faq-step-3.png" alt-text="Screenshot that shows an example of how AI instructions provide additional context to Copilot for interpreting user queries." lightbox="media/copilot-prep-data/copilot-prep-data-faq-step-3.png":::
            
          1. Add descriptions to tables and columns.

              Descriptions provide extra metadata that Copilot can use to understand your model.
              
              Although descriptions currently influence only some Copilot behaviors, they'll play a larger role in future capabilities. Adding them now helps build a strong foundation for long-term success with natural language interactions in Power BI.

      - question: |
          Can I create tooling on a report instead of on the model?
        answer: |
          Today, tooling and configuration features are only available on the model. You can't yet configure different reports built from the same model. You set the schema, verified answers, instructions, and descriptions on the semantic model, not on the report.   

      - question: |
          When I prepare my data for Copilot, which capabilities are affected?
        answer: |
          Refer to the following table: 

          | Capability| AI data schemas	| Verified answers	| AI instructions	| Descriptions |
          |---|---|---|---|---|
          |Get a summary of my report|	No|	No|	Yes	|No|
          |Ask a question about the visuals on my report|	No	|Yes|	Yes	|No|
          |Ask a question about my semantic model	|Yes	|Yes	|Yes|	No|
          |Create a report page	|No	|No	|Yes	|No|
          |Search	|No	|Yes	|No	|Yes|
          |DAX query	|No|	No	|Yes |	Yes|

  - name: Know which feature to use
    questions:
      - question: |
           I'm trying to get Copilot to select the right field. Which feature should I use?
        answer: |
          1. Define your AI data schema. 

             Remove any tables, columns, or fields that are irrelevant to your users' needs. This action helps Copilot focus on the most relevant parts of your model, and helps ensure that it selects the right fields when it responds to queries.

          1. Use verified answers for visuals in reports.
            
             If Copilot can use a visual in your report to derive an answer to a question, create a verified answer. This practice helps ensure that Copilot consistently returns the correct visual when users ask questions with specific trigger phrases.

          1. Customize instructions for specific fields.
            
             After you set the schema and verified answers, you can use AI instructions to guide Copilot when selecting particular fields. Use instructions for fine tuning and for advanced scenarios, after you set other **Prep data for AI** features. 
             This sequence of steps helps ensure that Copilot returns the most accurate and contextually relevant results to users, guided by your model's structure and your defined instructions.
       
      - question: |
           I'm trying to get Copilot to understand the term I'm using. Which feature should I use?
        answer: |
          If Copilot struggles to understand a term that always has the same single correct item to reference in your model, you can provide an alternative name through AI instructions. 
          
          For example, if your team calls the people who sell your products *closers*, provide a reference in your AI instructions. Set *sellers* to also be known as *closers*.

      - question: |
           I'm trying to get Copilot to understand terms with conditions or groupings. Which feature should I use?
        answer: |
          If your team uses certain terms that aren't an exact 1:1 match with tables or fields in your model, you can use AI instructions to help clarify different items with certain conditions or groupings. 

          For example, a sales team might classify anyone who sells more than 100% of their targets in any given month as *high performers*. They should provide the following instructions to Copilot:
          
          *High performer* means a seller who meets 100% or more of their monthly target. 
          
          Now, when a user asks, "Who were the high performers last month?" Copilot knows exactly what *high performer* means in your team and organization. 
          
          In another example, an organization might classify seasons. Your team might call January to May *slow season*. June to September might be *busy season*. October to December might be *standard season*.  

          Within AI instructions, you can set the following definitions:

          - *Slow season* means January to May.
          - *Busy season* means June to September.
          - *Standard season* means October to December. 
          
          Now, when a user asks, "What were the total sales for busy season last year?" Copilot understands what timeframe the user means by *busy season*. 

      - question: |
           I'm trying to get Copilot to return the correct answer to the most commonly asked questions. Which feature should I use?
        answer: |
          Consumers of your report and data likely ask some questions more frequently. You can address this occurrence by applying verified answers to your model. Apply a verified answer by selecting a visual and setting trigger phrases. When a user asks about the topic, Copilot returns information by using the assigned visual. 
          
          For example, consumers of the report and model might often ask, "What product had the highest sales last week?" You can set a verified answer to help Copilot understand where it can find the right information. This method helps authors and consumers trust that the answer is correct. 

      - question: |
           I'm trying to get Copilot to return different answers based on the domains or user groups. Which feature should I use?
        answer: |
          The capabilities as they exist today are limited to broad consumption. You can't currently create a glossary based on different groups, or define a term in two different ways. For example, engineers might define *usage* as *number of times clicked*, but product managers might define *usage* as *paying customers in a given month*. You can't currently give *usage* different definitions in the same model.

      - question: |
           Why does Copilot say it can't see a field in my semantic model even though it's part of the AI schema?
        answer: |
          In scenarios where your semantic model schema is too large for Copilot to render a response, Copilot reduces the model schema so it can understand the schema and generate a response. You can tell when this reduction happens by downloading the Copilot Diagnostics and checking for "AgentSchemaReduced" in the warnings.
 
  - name: Prep data for AI
    questions:
      - question: |
           I get an error that says, "Copilot is currently syncing with the data model." What does this mean? 
        answer: |    
          For Copilot to perform at its best, it must understand the underlying data in the semantic model. To understand the underlying data, Copilot in Power BI indexes the semantic model so it can accurately search for relevant values to match. This process helps Copilot effectively answer questions based on your prompt. 

          Consider a dataset related to Hawaii tourism. To answer questions like, "How did weather affect tourist visits on Maui?" Copilot needs to understand that Maui is an instance value in the semantic model in the **Island name** column of the **Island** table.

          For Copilot to effectively search these instance values, Power BI indexes the semantic model when you enable Power BI Q&A. Power BI reindexes the model when it detects changes.  

          #### Model indexing frequency 

          Power BI indexes all models that have the Q&A setting enabled. 
          
          > [!NOTE]
          > The Q&A setting is on by default for *import and Direct Lake* models. For more details about this setting, see the Q&A settings documentation. 

          Reindexing occurs when one of the following actions takes place: 

          - For *import* models: 
            - You publish or republish the model to the service. 
            - A manual or scheduled refresh runs on the model, and you use Copilot and Q&A within the last 14 days. 
          - For *DirectQuery* and *Direct Lake* models: 
            - You publish or republish the model to the service.
            - The index is older than 24 hours, and you use Copilot and Q&A within the last 14 days.

          The following message in Copilot indicates that the model is currently indexing. The message automatically resolves after indexing finishes.  

          :::image type="content" source="media/copilot-prep-data/copilot-prep-data-faq-indexing.png" alt-text="Screenshot that shows a Copilot message that indicates that the model is currently indexing." lightbox="media/copilot-prep-data/copilot-prep-data-faq-indexing.png":::

          
          > [!NOTE]
          > This error doesn't mean that Copilot isn't available. This message indicates that any new instance values you add or change in the model might not appear in Copilot responses until the indexing activity finishes. 

          #### Indexing methodology 

          Power BI only indexes text columns in the semantic model. Power BI doesn't index columns that you hide in the AI schema through the **Prep your data for AI** feature.  

          Power BI indexes up to five million instance values with columns and indexes the smallest cardinality first. `DISTINCTCOUNT` determines the column's cardinality for import models, and `COLUMNSTATISTICS` determines the column's cardinality for DirectQuery models. For DirectQuery sources, the `COLUMNSTATISTICS` function uses the `APPROXIMATEDISTINCTCOUNT` function to efficiently determine approximate column cardinalities for underlying data sources that support it. 
          
          To further prevent overloading the underlying system for DirectQuery models with an influx of queries due to indexing, Power BI caches the results of `COLUMNSTATISTICS` and recomputes the statistics every seven days. During the indexing process, if indexing the next column would cross the five million instance value upper bound, Power BI skips that column entirely. 

          If indexing reaches the limit, Copilot still answers based on the index it built, which doesn't include all instance values. You see the following warning when the semantic model hits the indexing limit. 

          :::image type="content" source="media/copilot-prep-data/copilot-prep-data-faq-index-methodology.png" alt-text="Screenshot that shows the Copilot message that indicates that the model is currently indexing." lightbox="media/copilot-prep-data/copilot-prep-data-faq-index-methodology.png":::

          #### Known limitations 

          - Indexing has an upper bound limit of five million instance values or 1,000 model entities (tables/columns) for large semantic models. 
          - Power BI doesn't index text values of 100+ characters.
          - DirectQuery models only index columns for data sources that support `APPROXIMATEDISTINCTCOUNT`.
          - Indexing for DirectQuery and Direct Lake models occurs once during a 24-hour time period unless you republish the model.
          - If the underlying semantic model refresh fails, the data index might be stale until the next successful semantic model refresh.
          - The first data index generation for the semantic model might take an extra 15 minutes to allow for backend activities to generate the index.
        
